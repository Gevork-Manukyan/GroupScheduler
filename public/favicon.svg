<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- A punch card. Three holes sit dark; the one where every card in the
       stack lines up is lit. -->
  <rect width="64" height="64" rx="14" fill="#16201b" />
  <rect x="13" y="14" width="15.5" height="15.5" rx="3" fill="#33423a" />
  <rect x="35.5" y="14" width="15.5" height="15.5" rx="3" fill="#33423a" />
  <rect x="13" y="36.5" width="15.5" height="15.5" rx="3" fill="#33423a" />
  <rect x="35.5" y="36.5" width="15.5" height="15.5" rx="3" fill="#ffc24b" />
</svg>
